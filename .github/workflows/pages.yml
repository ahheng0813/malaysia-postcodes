name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp *.json _site/
          cp index.html _site/
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const source = JSON.parse(fs.readFileSync('all.json', 'utf8'));
          const stateMap = {
            'wp kuala lumpur': { name: 'Kuala Lumpur', code: 'KUL' },
            johor: { name: 'Johor', code: 'JHR' },
            kedah: { name: 'Kedah', code: 'KDH' },
            kelantan: { name: 'Kelantan', code: 'KTN' },
            melaka: { name: 'Melaka', code: 'MLK' },
            'negeri sembilan': { name: 'Negeri Sembilan', code: 'NSN' },
            pahang: { name: 'Pahang', code: 'PHG' },
            'pulau pinang': { name: 'Pulau Pinang', code: 'PNG' },
            perak: { name: 'Perak', code: 'PRK' },
            perlis: { name: 'Perlis', code: 'PLS' },
            sabah: { name: 'Sabah', code: 'SBH' },
            sarawak: { name: 'Sarawak', code: 'SWK' },
            selangor: { name: 'Selangor', code: 'SGR' },
            terengganu: { name: 'Terengganu', code: 'TRG' },
            'wp labuan': { name: 'Labuan', code: 'LBN' },
            'wp putrajaya': { name: 'Putrajaya', code: 'PJY' }
          };

          const normalizeStateName = (value) => value.toLowerCase().replace(/\./g, '').replace(/\s+/g, ' ').trim();

          const output = {
            metadata: {
              version: '2025.1',
              description: 'Complete Malaysia postcode database',
              total_states: source.state.length,
              source: 'Community maintained - https://github.com/ahheng0813/malaysia-postcodes'
            },
            states: source.state.map((state) => {
              const stateInfo = stateMap[normalizeStateName(state.name)] || { name: state.name, code: '' };

              return {
                name: stateInfo.name,
                code: stateInfo.code,
                cities: (state.city || []).map((city) => ({
                  name: city.name,
                  postcodes: city.postcode || []
                }))
              };
            })
          };

          const outputPath = path.join('_site', 'main', 'data', 'json', 'postcodes.json');
          fs.mkdirSync(path.dirname(outputPath), { recursive: true });
          fs.writeFileSync(outputPath, `${JSON.stringify(output, null, 2)}\n`);
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
